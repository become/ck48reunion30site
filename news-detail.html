<head>

  <meta name="description" content="建中48屆30年重聚最新公告與活動消息。">
  <meta name="robots" content="index, follow">
  <!-- Open Graph (updated dynamically after article loads) -->

  <meta property="og:site_name"   content="建中48屆30重聚">
  <meta property="og:locale"      content="zh_TW">
  <meta property="og:title"       content="最新消息 | 建中48屆30重聚">
  <meta property="og:description" content="建中48屆30年重聚最新公告與活動消息。">
  <meta property="og:image"       content="https://ck48.reunion30.tw/images/og-default.jpg">
  <meta property="og:image:width"  content="1200">
  <meta property="og:image:height" content="630">
  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="最新消息 | 建中48屆30重聚">
  <meta name="twitter:description" content="建中48屆30年重聚最新公告與活動消息。">
  <meta name="twitter:image"       content="https://ck48.reunion30.tw/images/og-default.jpg">
  <link rel="icon" href="images/favico.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .article-cover { width:100%; max-height:420px; object-fit:cover; border-radius:var(--radius-xl); margin-bottom:32px; }
    .article-body p { margin-bottom:18px; font-size:17px; line-height:1.85; }
    .article-body img { max-width:100%; border-radius:var(--radius-md); margin:8px 0; }
    .article-nav { display:flex;justify-content:space-between;gap:16px;margin-top:48px;padding-top:32px;border-top:1px solid var(--color-border); }
    .article-nav a { font-size:14px;font-weight:600;color:var(--color-primary); display:flex;align-items:center;gap:6px; }
    .article-nav a:hover { color:var(--color-accent); }
  </style>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-YJYP34JVKM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-YJYP34JVKM');
  </script>
</head>
<body class="page-top">
<div id="header-placeholder"></div>

<section class="section">
  <div class="container--md">
    <nav class="breadcrumb">
      <a href="index.html">首頁</a>
      <span class="breadcrumb__sep">/</span>
      <a href="news.html">最新消息</a>
      <span class="breadcrumb__sep">/</span>
      <span id="bc-title">文章</span>
    </nav>
    <div id="article-wrap">
      <!-- Rendered by JS -->
    </div>
  </div>
</section>

<!-- More news -->
<section class="section section--alt">
  <div class="container">
    <div class="section-title">
      <h2 class="section-title__main" style="font-size:24px;">其他消息</h2>
    </div>
    <div class="news-grid" id="related-news"></div>
  </div>
</section>

<div id="footer-placeholder"></div>
<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/components.js"></script>
<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(location.search);
  const slug = params.get('slug') || CK48_DATA.news[0].slug;

  let news, allNews;

  // Load detail
  try {
    [news, allNews] = await Promise.all([
      CK48_API.getNewsDetail(slug),
      CK48_API.getNews(),
    ]);
  } catch (e) {
    // 404 = article doesn't exist, show not-found; other errors = API down, use mock
    if (e.message && e.message.includes('404')) {
      document.getElementById('article-wrap').innerHTML = `
        <div style="text-align:center;padding:60px 0;">
          <div style="font-size:48px;margin-bottom:16px;">📭</div>
          <h2 style="color:var(--color-primary);margin-bottom:12px;">找不到此文章</h2>
          <p style="color:var(--color-text-muted);margin-bottom:28px;">此消息不存在或已被移除。</p>
          <a href="news.html" class="btn btn--outline">← 返回消息列表</a>
        </div>`;
      document.getElementById('related-news').closest('section').style.display = 'none';
      return;
    }
    console.warn('API unavailable, using mock data', e);
    allNews = CK48_DATA.news;
    news = allNews.find(n => n.slug === slug);
    if (!news) {
      document.getElementById('article-wrap').innerHTML = `
        <div style="text-align:center;padding:60px 0;">
          <div style="font-size:48px;margin-bottom:16px;">📭</div>
          <h2 style="color:var(--color-primary);margin-bottom:12px;">找不到此文章</h2>
          <p style="color:var(--color-text-muted);margin-bottom:28px;">此消息不存在或已被移除。</p>
          <a href="news.html" class="btn btn--outline">← 返回消息列表</a>
        </div>`;
      document.getElementById('related-news').closest('section').style.display = 'none';
      return;
    }
  }

  const idx  = allNews.findIndex(n => n.slug === news.slug);
  const prev = allNews[idx - 1];
  const next = allNews[idx + 1];

  const ogTitle = `${news.title} | 建中48屆30重聚`;
  const ogDesc  = news.summary || (news.content || '').replace(/<[^>]+>/g,'').slice(0,120) || '建中48屆30年重聚最新消息';
  const ogUrl   = `https://ck48.reunion30.tw/news-detail.html?slug=${news.slug}`;
  const ogImg   = news.coverImageUrl || 'https://ck48.reunion30.tw/images/og-default.jpg';

  document.title = ogTitle;
  document.querySelector('meta[name="description"]')?.setAttribute('content', ogDesc);
  document.querySelector('meta[property="og:title"]')?.setAttribute('content', ogTitle);
  document.querySelector('meta[property="og:description"]')?.setAttribute('content', ogDesc);
  document.querySelector('meta[property="og:url"]')?.setAttribute('content', ogUrl);
  document.querySelector('meta[property="og:image"]')?.setAttribute('content', ogImg);
  document.querySelector('meta[name="twitter:title"]')?.setAttribute('content', ogTitle);
  document.querySelector('meta[name="twitter:description"]')?.setAttribute('content', ogDesc);
  document.querySelector('meta[name="twitter:image"]')?.setAttribute('content', ogImg);
  document.getElementById('bc-title').textContent = news.title;

  const articleDate = news.publishedAt ? formatDate(news.publishedAt) : (news.date ? formatDate(news.date) : '');
  document.getElementById('article-wrap').innerHTML = `
    ${news.coverImageUrl ? `<img class="article-cover" src="${news.coverImageUrl}" alt="${news.title}">` : ''}
    <div class="news-card__meta" style="margin-bottom:12px;">
      <span class="badge badge--news">${news.category}</span>
      <span class="news-card__date">${articleDate}</span>
    </div>
    <h1 style="font-size:clamp(24px,3.5vw,38px);color:var(--color-primary);margin-bottom:28px;line-height:1.25;">${news.title}</h1>
    <div class="article-body">${news.content || ''}</div>
    <div class="article-nav">
      <div>${prev ? `<a href="news-detail.html?slug=${prev.slug}">← ${prev.title}</a>` : ''}</div>
      <div>${next ? `<a href="news-detail.html?slug=${next.slug}">${next.title} →</a>` : ''}</div>
    </div>
    <div style="margin-top:24px;">
      <a href="news.html" class="btn btn--outline">← 返回消息列表</a>
    </div>`;

  // Related: prev + next, fill missing with random
  const others = allNews.filter(n => n.slug !== slug);
  const picks = [];

  function pickRandom(exclude) {
    const pool = others.filter(n => !exclude.find(p => p.slug === n.slug));
    return pool.length ? pool[Math.floor(Math.random() * pool.length)] : null;
  }

  const prevItem = prev || pickRandom(picks);
  if (prevItem) picks.push(prevItem);

  const nextItem = (next && !picks.find(p => p.slug === next.slug)) ? next : pickRandom(picks);
  if (nextItem) picks.push(nextItem);

  const thirdItem = pickRandom(picks);
  if (thirdItem) picks.push(thirdItem);

  const rg = document.getElementById('related-news');
  if (picks.length === 0) {
    rg.closest('section').style.display = 'none';
  } else {
    picks.forEach(n => {
      const date = n.publishedAt ? formatDate(n.publishedAt) : (n.date ? formatDate(n.date) : '');
      const hasImg = !!n.coverImageUrl;
      rg.innerHTML += `
        <article class="news-card${hasImg ? ' news-card--with-img' : ''}">
          <div class="news-card__body">
            <div class="news-card__meta">
              <span class="badge badge--news">${n.category}</span>
              <span class="news-card__date">${date}</span>
            </div>
            <h3 class="news-card__title">${n.title}</h3>
            <p class="news-card__summary">${n.summary || ''}</p>
            <a href="news-detail.html?slug=${n.slug}" class="news-card__link">閱讀更多 →</a>
          </div>
          ${hasImg ? `<img class="news-card__thumb" src="${n.coverImageUrl}" alt="${n.title}" loading="lazy">` : ''}
        </article>`;
    });
  }
});
</script>
</body>
</html>
