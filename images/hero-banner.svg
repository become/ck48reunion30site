<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 720" width="1440" height="720">
  <defs>
    <!-- Main background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0A1929"/>
      <stop offset="40%"  stop-color="#1F3A5F"/>
      <stop offset="100%" stop-color="#2C4F7A"/>
    </linearGradient>
    <!-- Gold glow gradient -->
    <radialGradient id="goldGlow" cx="70%" cy="55%" r="45%">
      <stop offset="0%"   stop-color="#B08D57" stop-opacity="0.20"/>
      <stop offset="60%"  stop-color="#B08D57" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#B08D57" stop-opacity="0"/>
    </radialGradient>
    <!-- Left warm glow -->
    <radialGradient id="warmGlow" cx="25%" cy="40%" r="35%">
      <stop offset="0%"   stop-color="#7A2E3A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7A2E3A" stop-opacity="0"/>
    </radialGradient>
    <!-- Building overlay gradient -->
    <linearGradient id="buildingFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#C0392B" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7A1F1F" stop-opacity="0.7"/>
    </linearGradient>
    <!-- Building shadow -->
    <linearGradient id="buildingShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0A1929" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A1929" stop-opacity="0.85"/>
    </linearGradient>
    <!-- Text glow filter -->
    <filter id="textGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Soft blur for depth -->
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <!-- Gold line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#B08D57" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#B08D57" stop-opacity="0.9"/>
      <stop offset="70%"  stop-color="#B08D57" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#B08D57" stop-opacity="0"/>
    </linearGradient>
    <!-- Vignette overlay -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.45"/>
    </radialGradient>
    <!-- Clip path for building -->
    <clipPath id="buildingClip">
      <rect x="720" y="0" width="720" height="720"/>
    </clipPath>
  </defs>

  <!-- ── Background ── -->
  <rect width="1440" height="720" fill="url(#bgGrad)"/>
  <rect width="1440" height="720" fill="url(#goldGlow)"/>
  <rect width="1440" height="720" fill="url(#warmGlow)"/>

  <!-- ── Grid pattern overlay ── -->
  <g opacity="0.04">
    <line x1="0" y1="120" x2="1440" y2="120" stroke="white" stroke-width="1"/>
    <line x1="0" y1="240" x2="1440" y2="240" stroke="white" stroke-width="1"/>
    <line x1="0" y1="360" x2="1440" y2="360" stroke="white" stroke-width="1"/>
    <line x1="0" y1="480" x2="1440" y2="480" stroke="white" stroke-width="1"/>
    <line x1="0" y1="600" x2="1440" y2="600" stroke="white" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="720" stroke="white" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="720" stroke="white" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="720" stroke="white" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="720" stroke="white" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="720" stroke="white" stroke-width="1"/>
  </g>

  <!-- ── 建中紅樓 Illustration (Right side) ── -->
  <g clip-path="url(#buildingClip)" opacity="0.55">
    <!-- Ground -->
    <rect x="720" y="580" width="720" height="140" fill="#0A1929"/>
    <!-- Main building base -->
    <rect x="820" y="260" width="520" height="320" fill="#8B1C1C"/>
    <!-- Brick texture lines horizontal -->
    <g stroke="#701515" stroke-width="0.8" opacity="0.6">
      <line x1="820" y1="280" x2="1340" y2="280"/>
      <line x1="820" y1="296" x2="1340" y2="296"/>
      <line x1="820" y1="312" x2="1340" y2="312"/>
      <line x1="820" y1="328" x2="1340" y2="328"/>
      <line x1="820" y1="344" x2="1340" y2="344"/>
      <line x1="820" y1="360" x2="1340" y2="360"/>
      <line x1="820" y1="376" x2="1340" y2="376"/>
      <line x1="820" y1="392" x2="1340" y2="392"/>
      <line x1="820" y1="408" x2="1340" y2="408"/>
      <line x1="820" y1="424" x2="1340" y2="424"/>
      <line x1="820" y1="440" x2="1340" y2="440"/>
      <line x1="820" y1="456" x2="1340" y2="456"/>
      <line x1="820" y1="472" x2="1340" y2="472"/>
      <line x1="820" y1="488" x2="1340" y2="488"/>
      <line x1="820" y1="504" x2="1340" y2="504"/>
      <line x1="820" y1="520" x2="1340" y2="520"/>
      <line x1="820" y1="536" x2="1340" y2="536"/>
      <line x1="820" y1="552" x2="1340" y2="552"/>
    </g>
    <!-- Brick texture vertical (staggered) -->
    <g stroke="#701515" stroke-width="0.5" opacity="0.4">
      <line x1="860" y1="280" x2="860" y2="296"/> <line x1="900" y1="296" x2="900" y2="312"/>
      <line x1="940" y1="280" x2="940" y2="296"/> <line x1="980" y1="296" x2="980" y2="312"/>
      <line x1="1020" y1="280" x2="1020" y2="296"/> <line x1="1060" y1="296" x2="1060" y2="312"/>
      <line x1="1100" y1="280" x2="1100" y2="296"/> <line x1="1140" y1="296" x2="1140" y2="312"/>
      <line x1="1180" y1="280" x2="1180" y2="296"/> <line x1="1220" y1="296" x2="1220" y2="312"/>
      <line x1="1260" y1="280" x2="1260" y2="296"/> <line x1="1300" y1="296" x2="1300" y2="312"/>
    </g>

    <!-- ── Roof / Parapet ── -->
    <rect x="800" y="240" width="560" height="26" fill="#7A1818"/>
    <!-- Battlements / crenellations -->
    <rect x="800" y="218" width="28" height="24" fill="#7A1818"/>
    <rect x="840" y="218" width="28" height="24" fill="#7A1818"/>
    <rect x="880" y="218" width="28" height="24" fill="#7A1818"/>
    <rect x="920" y="218" width="28" height="24" fill="#7A1818"/>
    <rect x="960" y="218" width="28" height="24" fill="#7A1818"/>
    <rect x="1000" y="218" width="28" height="24" fill="#7A1818"/>
    <rect x="1040" y="218" width="28" height="24" fill="#7A1818"/>
    <rect x="1080" y="218" width="28" height="24" fill="#7A1818"/>
    <rect x="1120" y="218" width="28" height="24" fill="#7A1818"/>
    <rect x="1160" y="218" width="28" height="24" fill="#7A1818"/>
    <rect x="1200" y="218" width="28" height="24" fill="#7A1818"/>
    <rect x="1240" y="218" width="28" height="24" fill="#7A1818"/>
    <rect x="1280" y="218" width="28" height="24" fill="#7A1818"/>
    <rect x="1320" y="218" width="28" height="24" fill="#7A1818"/>

    <!-- ── Center tower ── -->
    <rect x="1010" y="140" width="140" height="120" fill="#8B1C1C"/>
    <!-- Tower brick lines -->
    <g stroke="#701515" stroke-width="0.8" opacity="0.5">
      <line x1="1010" y1="156" x2="1150" y2="156"/>
      <line x1="1010" y1="172" x2="1150" y2="172"/>
      <line x1="1010" y1="188" x2="1150" y2="188"/>
      <line x1="1010" y1="204" x2="1150" y2="204"/>
      <line x1="1010" y1="220" x2="1150" y2="220"/>
    </g>
    <!-- Tower battlements -->
    <rect x="1010" y="118" width="22" height="24" fill="#7A1818"/>
    <rect x="1044" y="118" width="22" height="24" fill="#7A1818"/>
    <rect x="1078" y="118" width="22" height="24" fill="#7A1818"/>
    <rect x="1112" y="118" width="22" height="24" fill="#7A1818"/>
    <!-- Tower top flag -->
    <line x1="1080" y1="60" x2="1080" y2="120" stroke="#B08D57" stroke-width="2.5"/>
    <polygon points="1080,62 1110,72 1080,82" fill="#B08D57" opacity="0.9"/>

    <!-- ── Arched Windows – Ground floor ── -->
    <!-- Window arch function via rect + ellipse -->
    <g fill="#1a2d45" stroke="#9B3232" stroke-width="1.5">
      <!-- W1 -->
      <rect x="850" y="390" width="50" height="80"/>
      <ellipse cx="875" cy="390" rx="25" ry="14"/>
      <!-- W2 -->
      <rect x="940" y="390" width="50" height="80"/>
      <ellipse cx="965" cy="390" rx="25" ry="14"/>
      <!-- W3 -->
      <rect x="1030" y="390" width="50" height="80"/>
      <ellipse cx="1055" cy="390" rx="25" ry="14"/>
      <!-- W4 -->
      <rect x="1120" y="390" width="50" height="80"/>
      <ellipse cx="1145" cy="390" rx="25" ry="14"/>
      <!-- W5 -->
      <rect x="1210" y="390" width="50" height="80"/>
      <ellipse cx="1235" cy="390" rx="25" ry="14"/>
    </g>
    <!-- Window light/reflection lines -->
    <g stroke="rgba(176,200,240,0.15)" stroke-width="1">
      <line x1="860" y1="395" x2="860" y2="468"/>
      <line x1="871" y1="393" x2="871" y2="468"/>
      <line x1="950" y1="395" x2="950" y2="468"/>
      <line x1="961" y1="393" x2="961" y2="468"/>
      <line x1="1040" y1="395" x2="1040" y2="468"/>
      <line x1="1051" y1="393" x2="1051" y2="468"/>
      <line x1="1130" y1="395" x2="1130" y2="468"/>
      <line x1="1141" y1="393" x2="1141" y2="468"/>
      <line x1="1220" y1="395" x2="1220" y2="468"/>
      <line x1="1231" y1="393" x2="1231" y2="468"/>
    </g>

    <!-- ── Second floor windows ── -->
    <g fill="#1a2d45" stroke="#9B3232" stroke-width="1.2">
      <rect x="862" y="288" width="40" height="56"/>
      <ellipse cx="882" cy="288" rx="20" ry="10"/>
      <rect x="952" y="288" width="40" height="56"/>
      <ellipse cx="972" cy="288" rx="20" ry="10"/>
      <rect x="1042" y="288" width="40" height="56"/>
      <ellipse cx="1062" cy="288" rx="20" ry="10"/>
      <rect x="1132" y="288" width="40" height="56"/>
      <ellipse cx="1152" cy="288" rx="20" ry="10"/>
      <rect x="1222" y="288" width="40" height="56"/>
      <ellipse cx="1242" cy="288" rx="20" ry="10"/>
    </g>

    <!-- ── Main entrance door ── -->
    <rect x="1045" y="470" width="70" height="110" fill="#0d1e30" rx="35 35 0 0"/>
    <rect x="1050" y="478" width="60" height="95" fill="#111f33" rx="30 30 0 0"/>
    <!-- Door handle -->
    <circle cx="1080" cy="540" r="4" fill="#B08D57" opacity="0.8"/>

    <!-- ── Steps ── -->
    <rect x="980" y="578" width="200" height="12" fill="#6B1515" opacity="0.8"/>
    <rect x="1000" y="590" width="160" height="10" fill="#5A1212" opacity="0.7"/>

    <!-- ── White cornice lines ── -->
    <rect x="820" y="382" width="520" height="6" fill="#E8D4B0" opacity="0.3"/>
    <rect x="820" y="264" width="520" height="5" fill="#E8D4B0" opacity="0.25"/>

    <!-- ── Light pillars left & right ── -->
    <rect x="830" y="260" width="22" height="320" fill="#7A1818"/>
    <rect x="1308" y="260" width="22" height="320" fill="#7A1818"/>

    <!-- ── Trees (flanking) ── -->
    <!-- Left tree -->
    <rect x="780" y="480" width="8" height="100" fill="#1a3020"/>
    <ellipse cx="784" cy="455" rx="28" ry="40" fill="#1E4025" opacity="0.85"/>
    <ellipse cx="784" cy="440" rx="22" ry="32" fill="#245230"/>
    <!-- Right tree 1 -->
    <rect x="1350" y="480" width="8" height="100" fill="#1a3020"/>
    <ellipse cx="1354" cy="455" rx="28" ry="40" fill="#1E4025" opacity="0.85"/>
    <ellipse cx="1354" cy="440" rx="22" ry="32" fill="#245230"/>
    <!-- Right tree 2 (taller) -->
    <rect x="1395" y="440" width="8" height="140" fill="#1a3020"/>
    <ellipse cx="1399" cy="415" rx="24" ry="36" fill="#1E4025" opacity="0.8"/>
    <ellipse cx="1399" cy="400" rx="18" ry="28" fill="#245230"/>

    <!-- Ground shadow -->
    <rect x="720" y="560" width="720" height="160" fill="url(#buildingShadow)"/>
  </g>

  <!-- ── Stars / particles (atmosphere) ── -->
  <g fill="white">
    <circle cx="110" cy="60"  r="1.2" opacity="0.5"/>
    <circle cx="245" cy="32"  r="0.8" opacity="0.4"/>
    <circle cx="380" cy="88"  r="1.0" opacity="0.5"/>
    <circle cx="52"  cy="140" r="0.7" opacity="0.3"/>
    <circle cx="480" cy="50"  r="1.3" opacity="0.4"/>
    <circle cx="600" cy="120" r="0.9" opacity="0.35"/>
    <circle cx="160" cy="200" r="0.6" opacity="0.3"/>
    <circle cx="320" cy="160" r="1.1" opacity="0.4"/>
    <circle cx="70"  cy="280" r="0.8" opacity="0.25"/>
    <circle cx="550" cy="200" r="1.0" opacity="0.35"/>
    <circle cx="680" cy="80"  r="0.7" opacity="0.3"/>
    <circle cx="90"  cy="380" r="0.6" opacity="0.2"/>
    <circle cx="420" cy="300" r="0.9" opacity="0.3"/>
    <circle cx="200" cy="340" r="0.7" opacity="0.25"/>
  </g>

  <!-- ── Cherry blossom petals (floating) ── -->
  <g opacity="0.35" fill="#D4A0A8">
    <!-- Petal 1 -->
    <ellipse cx="620" cy="180" rx="5" ry="2.5" transform="rotate(-30 620 180)"/>
    <!-- Petal 2 -->
    <ellipse cx="540" cy="240" rx="4.5" ry="2" transform="rotate(15 540 240)"/>
    <!-- Petal 3 -->
    <ellipse cx="690" cy="310" rx="5.5" ry="2.5" transform="rotate(-45 690 310)"/>
    <!-- Petal 4 -->
    <ellipse cx="580" cy="380" rx="4" ry="2" transform="rotate(20 580 380)"/>
    <!-- Petal 5 -->
    <ellipse cx="660" cy="440" rx="5" ry="2.2" transform="rotate(-10 660 440)"/>
    <!-- Petal 6 -->
    <ellipse cx="510" cy="320" rx="4.5" ry="2" transform="rotate(35 510 320)"/>
    <!-- Petal 7 -->
    <ellipse cx="460" cy="200" rx="3.5" ry="1.8" transform="rotate(-20 460 200)"/>
    <!-- Petal 8 -->
    <ellipse cx="400" cy="440" rx="4" ry="2" transform="rotate(25 400 440)"/>
  </g>

  <!-- ── Decorative gold frame elements ── -->
  <!-- Top left corner ornament -->
  <g fill="none" stroke="#B08D57" opacity="0.45">
    <line x1="48" y1="40" x2="48" y2="100" stroke-width="1.5"/>
    <line x1="40" y1="48" x2="120" y2="48" stroke-width="1.5"/>
    <rect x="52" y="52" width="60" height="40" stroke-width="0.8" opacity="0.5"/>
  </g>
  <!-- Bottom right corner ornament -->
  <g fill="none" stroke="#B08D57" opacity="0.45">
    <line x1="1392" y1="680" x2="1392" y2="620" stroke-width="1.5"/>
    <line x1="1400" y1="672" x2="1320" y2="672" stroke-width="1.5"/>
    <rect x="1328" y="628" width="60" height="40" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- ── Vertical divider line (center) ── -->
  <line x1="680" y1="80" x2="680" y2="640" stroke="#B08D57" stroke-width="0.8" opacity="0.25" stroke-dasharray="4 8"/>

  <!-- ── Content area (left side) ── -->
  <!-- Eyebrow text -->
  <g transform="translate(80, 168)">
    <!-- Accent line before eyebrow -->
    <rect x="0" y="7" width="32" height="2" fill="#B08D57" opacity="0.9"/>
    <text x="42" y="18" font-family="'Noto Sans TC', 'Inter', sans-serif" font-size="13" font-weight="600" letter-spacing="3" fill="#B08D57" opacity="0.9">CK48 REUNION 2026</text>
  </g>

  <!-- Main title -->
  <text x="80" y="270" font-family="'Noto Sans TC', 'Inter', sans-serif" font-size="64" font-weight="800" fill="white" letter-spacing="-1" filter="url(#textGlow)">建中第48屆</text>
  <text x="80" y="348" font-family="'Noto Sans TC', 'Inter', sans-serif" font-size="64" font-weight="800" fill="#B08D57" letter-spacing="-1">畢業30年重聚</text>

  <!-- English subtitle -->
  <text x="80" y="400" font-family="'Inter', sans-serif" font-size="24" font-weight="300" fill="rgba(255,255,255,0.65)" letter-spacing="6">CK48 Reunion</text>

  <!-- Gold divider line -->
  <rect x="80" y="424" width="220" height="2" fill="url(#lineGrad)" opacity="0.8"/>

  <!-- Slogan -->
  <text x="80" y="464" font-family="'Noto Sans TC', sans-serif" font-size="20" font-weight="500" fill="#B08D57" letter-spacing="5" opacity="0.92">三十再聚，少年依舊</text>

  <!-- Date info -->
  <g transform="translate(80, 500)">
    <!-- Date item 1 -->
    <circle cx="8" cy="10" r="5" fill="#B08D57" opacity="0.85"/>
    <text x="24" y="15" font-family="'Noto Sans TC', 'Inter', sans-serif" font-size="15" fill="rgba(255,255,255,0.85)">
      <tspan font-weight="700" fill="#B08D57">12/19（六）</tspan>
      <tspan>  重聚餐會</tspan>
    </text>
    <!-- Date item 2 -->
    <circle cx="8" cy="40" r="5" fill="#B08D57" opacity="0.85"/>
    <text x="24" y="45" font-family="'Noto Sans TC', 'Inter', sans-serif" font-size="15" fill="rgba(255,255,255,0.85)">
      <tspan font-weight="700" fill="#B08D57">12/20（日）</tspan>
      <tspan>  返校日園遊會</tspan>
    </text>
  </g>

  <!-- CTA Buttons (visual representation) -->
  <g transform="translate(80, 590)">
    <!-- Primary button -->
    <rect x="0" y="0" width="148" height="48" rx="8" fill="#B08D57"/>
    <text x="74" y="30" text-anchor="middle" font-family="'Noto Sans TC', 'Inter', sans-serif" font-size="16" font-weight="700" fill="white">立即報名</text>
    <!-- Secondary button -->
    <rect x="164" y="0" width="148" height="48" rx="8" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <text x="238" y="30" text-anchor="middle" font-family="'Noto Sans TC', 'Inter', sans-serif" font-size="16" font-weight="600" fill="white">找同學</text>
  </g>

  <!-- ── Vignette overlay ── -->
  <rect width="1440" height="720" fill="url(#vignette)"/>

  <!-- ── Bottom dark fade ── -->
  <linearGradient id="bottomFade" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="transparent"/>
    <stop offset="100%" stop-color="#0A1929" stop-opacity="0.6"/>
  </linearGradient>
  <rect y="500" width="1440" height="220" fill="url(#bottomFade)"/>

  <!-- ── Decorative dots pattern (subtle) ── -->
  <g fill="#B08D57" opacity="0.12">
    <circle cx="720" cy="100" r="2.5"/>
    <circle cx="740" cy="100" r="2.5"/>
    <circle cx="760" cy="100" r="2.5"/>
    <circle cx="720" cy="120" r="2.5"/>
    <circle cx="740" cy="120" r="2.5"/>
    <circle cx="760" cy="120" r="2.5"/>
    <circle cx="720" cy="140" r="2.5"/>
    <circle cx="740" cy="140" r="2.5"/>
    <circle cx="760" cy="140" r="2.5"/>
  </g>
</svg>
