name: Deploy

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set deploy target
        id: target
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "path=/var/www/ck48" >> $GITHUB_OUTPUT
            echo "host=ck48.reunion30.tw" >> $GITHUB_OUTPUT
          else
            echo "path=/var/www/test-ck48" >> $GITHUB_OUTPUT
            echo "host=test-ck48.reunion30.tw" >> $GITHUB_OUTPUT
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 159.223.40.36 >> ~/.ssh/known_hosts

      - name: Generate version
        run: |
          echo "{\"version\":\"v.$(date -u +%Y%m%d%H)\"}" > js/version.json

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ root@159.223.40.36:${{ steps.target.outputs.path }}/

      - name: Summary
        run: |
          echo "Deployed to ${{ steps.target.outputs.host }}"
          echo "Version: v.$(date -u +%Y%m%d%H)"
