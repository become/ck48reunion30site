<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>常見問題 · 建中第48屆30年重聚</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="page-top">
<div id="header-placeholder"></div>

<section class="page-hero">
  <div class="container page-hero__content">
    <div class="page-hero__eyebrow">FAQ</div>
    <h1 class="page-hero__title">常見問題</h1>
    <p class="page-hero__sub">若您有其他疑問，歡迎透過 Facebook 社團聯繫我們</p>
  </div>
</section>

<section class="section">
  <div class="container" style="max-width:780px;">
    <!-- Category tabs -->
    <div class="tabs reveal" data-faq-tabs>
      <button class="tab-btn active" data-faq-cat="all">全部問題</button>
      <button class="tab-btn" data-faq-cat="報名">報名相關</button>
      <button class="tab-btn" data-faq-cat="付款">付款費用</button>
      <button class="tab-btn" data-faq-cat="活動">活動資訊</button>
      <button class="tab-btn" data-faq-cat="商品">紀念商品</button>
    </div>

    <div class="faq-list reveal" id="faq-list">
      <!-- Rendered by JS -->
    </div>
  </div>
</section>

<!-- Still have questions -->
<section class="section section--alt">
  <div class="container" style="max-width:700px;text-align:center;">
    <div class="reveal">
      <div style="font-size:48px;margin-bottom:16px;">💬</div>
      <h2 style="font-size:26px;font-weight:700;color:var(--color-primary);margin-bottom:12px;">找不到您的問題？</h2>
      <p style="font-size:16px;color:var(--color-text-muted);margin-bottom:24px;">
        歡迎加入建中48屆 Facebook 社團，在社群中提問，籌備委員會將盡快回覆。
      </p>
      <a href="#" class="btn btn--secondary btn--lg">前往 Facebook 社團</a>
    </div>
  </div>
</section>

<section class="cta-section">
  <div class="container">
    <div class="cta-banner reveal">
      <div class="cta-banner__content">
        <h2 class="cta-banner__title">準備好報名了嗎？</h2>
        <p class="cta-banner__sub">三十年後的重聚，從這裡開始。</p>
        <div class="btn-group" style="justify-content:center;">
          <a href="registration.html" class="btn btn--primary btn--lg">立即報名</a>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="footer-placeholder"></div>
<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/components.js"></script>
<script src="js/main.js"></script>
<script>
// Fallback FAQ data
const FALLBACK_FAQ = [
  { cat: '報名', question: '這次活動只有建中48屆可以參加嗎？', answer: '本次活動以建中第48屆校友為主辦對象。若您是48屆校友的配偶或重要伴侶，部分場次可酌情邀請同行，請於報名備註說明。' },
  { cat: '付款', question: '活動費用如何計算？', answer: '重聚餐會每人費用約新台幣3,000至4,000元（含晚宴、活動費用），確切金額將於報名開放時公告。返校日活動免費，但大合照印刷費用另計。' },
  { cat: '活動', question: '如何找到失聯的同班同學？', answer: '您可以透過本站「找同學」頁面進行驗證後，查詢班級同學的聯絡資訊。此外，也可以加入建中48屆校友臉書社團，在社群中尋找同學。' },
  { cat: '付款', question: '報名後如何付款？', answer: '報名完成後，系統將發送確認信至您填寫的Email，並提供匯款帳號及截止日期。請於期限內（報名後14天）完成繳費以確認報名資格。' },
  { cat: '活動', question: '我住在海外，可以透過視訊方式參加嗎？', answer: '籌備委員會正在評估是否提供線上參與管道，若確定開放將另行公告。建議海外同學仍可考慮回台參加，這是難得的30年重聚！' },
  { cat: '商品', question: '紀念商品可以在活動當天購買嗎？', answer: '部分商品將在活動現場販售，但數量有限。建議提前透過本站紀念商品頁面預購，以確保取得心儀商品。' },
  { cat: '活動', question: '活動地點在哪裡？如何前往？', answer: '重聚餐會地點位於台北市中心（詳細地址報名開放前公告），返校日於建中校園舉行。詳細交通資訊請參閱「活動資訊」頁面。' },
  { cat: '付款', question: '如果報名後臨時無法出席，可以退費嗎？', answer: '活動截止日期（2026/10/31）前取消報名，可退還已繳費用之80%。截止後因已支付場地及餐飲費用，恕無法退費，但可轉讓給其他48屆校友。' },
  { cat: '報名', question: '可以只參加其中一天嗎？', answer: '可以！重聚餐會（12/19）與返校日（12/20）可分別報名，您可以選擇僅參加其中一天或兩天全參加，請於報名時勾選。' },
  { cat: '商品', question: '紀念商品如何寄送？', answer: '商品預計於活動前2-3週統一寄送，或可選擇活動當天現場領取，免運費。運送方式請於預購時選擇。' },
  { cat: '活動', question: '大合照當天需要穿著特定服裝嗎？', answer: '不強制規定，但建議當天穿著CK48 Reunion紀念T恤（可於本站商品頁預購），以增加視覺整體感。若有自備建中相關服裝也非常歡迎。' },
  { cat: '報名', question: '老師可以參加嗎？', answer: '籌備委員會歡迎48屆的授課老師及班導師受邀參加。若您知道老師的聯絡方式，可以邀請老師加入Facebook社團，由籌備委員會統一寄發邀請函。' }
];

document.addEventListener('DOMContentLoaded', async () => {
  let allFaq = [];
  let currentCat = 'all';

  function renderFAQ() {
    const list = document.getElementById('faq-list');
    const items = currentCat === 'all' ? allFaq : allFaq.filter(f => f.cat === currentCat);
    list.innerHTML = '';
    if (!items.length) {
      list.innerHTML = '<p style="color:var(--color-text-muted);text-align:center;padding:40px 0;">找不到問題。</p>';
      return;
    }
    items.forEach(f => {
      list.innerHTML += `
        <div class="faq-item">
          <button class="faq-item__question" aria-expanded="false">
            <span>${f.question}</span>
            <span class="faq-item__icon" aria-hidden="true">+</span>
          </button>
          <div class="faq-item__answer" role="region">
            <div class="faq-item__answer-inner">${f.answer}</div>
          </div>
        </div>`;
    });
    initFAQ();
  }

  document.querySelectorAll('[data-faq-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-faq-cat]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = btn.dataset.faqCat;
      renderFAQ();
    });
  });

  // Load from API, fallback to local data
  try {
    allFaq = await CK48_API.getFaq();
  } catch (e) {
    console.warn('API unavailable, using fallback data', e);
    allFaq = FALLBACK_FAQ;
  }
  renderFAQ();
});
</script>
</body>
</html>
