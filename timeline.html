<script>
document.addEventListener('DOMContentLoaded', () => {
  const tl = document.getElementById('timeline-full');
  CK48_DATA.timeline.forEach((item, i) => {
    const isOdd = i % 2 === 0;
    tl.innerHTML += `
      <div class="timeline-item ${item.highlight ? 'timeline-item--highlight' : ''} reveal">
        ${isOdd ? `
          <div class="timeline-item__content">
            <div class="timeline-item__date">${item.date ? formatDate(item.date) : ''}</div>
            <div class="timeline-item__title">${item.title}</div>
            <div class="timeline-item__desc">${item.description}</div>
          </div>
          <div class="timeline-item__dot"><div class="timeline-item__dot-inner"></div></div>
          <div class="timeline-item__spacer"></div>
        ` : `
          <div class="timeline-item__spacer"></div>
          <div class="timeline-item__dot"><div class="timeline-item__dot-inner"></div></div>
          <div class="timeline-item__content">
            <div class="timeline-item__date">${item.date ? formatDate(item.date) : ''}</div>
            <div class="timeline-item__title">${item.title}</div>
            <div class="timeline-item__desc">${item.description}</div>
          </div>
        `}
      </div>`;
  });
});
</script>
