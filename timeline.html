<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大事記 · 建中第48屆30年重聚</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="page-top">
<div id="header-placeholder"></div>

<section class="page-hero">
  <div class="container page-hero__content">
    <div class="page-hero__eyebrow">Timeline</div>
    <h1 class="page-hero__title">大事記</h1>
    <p class="page-hero__sub">從籌備到重聚，每一個重要節點</p>
  </div>
</section>

<section class="section">
  <div class="container" style="max-width:900px;">
    <div class="timeline" id="timeline-full">
      <!-- Rendered by JS -->
    </div>
  </div>
</section>


<div id="footer-placeholder"></div>
<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const tl = document.getElementById('timeline-full');
  CK48_DATA.timeline.forEach((item, i) => {
    const isOdd = i % 2 === 0;
    tl.innerHTML += `
      <div class="timeline-item ${item.highlight ? 'timeline-item--highlight' : ''} reveal">
        ${isOdd ? `
          <div class="timeline-item__content">
            <div class="timeline-item__date">${item.date ? formatDate(item.date) : ''}</div>
            <div class="timeline-item__title">${item.title}</div>
            <div class="timeline-item__desc">${item.description}</div>
          </div>
          <div class="timeline-item__dot"><div class="timeline-item__dot-inner"></div></div>
          <div class="timeline-item__spacer"></div>
        ` : `
          <div class="timeline-item__spacer"></div>
          <div class="timeline-item__dot"><div class="timeline-item__dot-inner"></div></div>
          <div class="timeline-item__content">
            <div class="timeline-item__date">${item.date ? formatDate(item.date) : ''}</div>
            <div class="timeline-item__title">${item.title}</div>
            <div class="timeline-item__desc">${item.description}</div>
          </div>
        `}
      </div>`;
  });
});
</script>
</body>
</html>
