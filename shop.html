  <style>
    .event-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      max-width: 960px;
      margin: 0 auto;
    }
    .ev-card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid rgba(15,30,60,.08);
      box-shadow: 0 2px 16px rgba(15,30,60,.07);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform .22s ease, box-shadow .22s ease;
      position: relative;
    }
    .ev-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--color-primary) 0%, #b8965a 100%);
    }
    .ev-card--ended::before { background: #d1d5db; }
    .ev-card:hover { transform: translateY(-4px); box-shadow: 0 10px 32px rgba(15,30,60,.12); }
    .ev-card--ended { opacity: .65; }
    .ev-card__head { padding: 26px 24px 20px; }
    .ev-card__badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .ev-badge {
      display: inline-flex; align-items: center;
      font-size: 11px; font-weight: 700; letter-spacing: .03em;
      padding: 3px 10px; border-radius: 20px;
    }
    .ev-badge--alumni  { background: #eef2ff; color: #3730a3; }
    .ev-badge--open    { background: #f0fdf4; color: #15803d; }
    .ev-badge--active  { background: #ecfdf5; color: #059669; }
    .ev-badge--ended   { background: #f3f4f6; color: #6b7280; }
    .ev-card__name {
      font-size: 20px; font-weight: 800;
      color: var(--color-primary); line-height: 1.3;
      margin-bottom: 10px;
    }
    .ev-card__desc {
      font-size: 14px; color: var(--color-text-muted);
      line-height: 1.7;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .ev-card__sep { height: 1px; background: var(--color-border); margin: 0 24px; }
    .ev-card__meta { padding: 16px 24px; display: flex; flex-direction: column; gap: 9px; }
    .ev-card__meta-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px;
    }
    .ev-card__meta-label { color: var(--color-text-muted); }
    .ev-card__meta-val   { font-weight: 600; color: var(--color-text); text-align: right; }
    .ev-card__foot { padding: 4px 24px 22px; margin-top: auto; }
  </style>

<body class="page-top">
<div id="header-placeholder"></div>

<section class="page-hero">
  <div class="container page-hero__content">
    <div class="page-hero__eyebrow">Merchandise</div>
    <h1 class="page-hero__title">紀念商品</h1>
    <p class="page-hero__sub">帶一份建中48屆的記憶回家</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div id="events-loading" style="text-align:center;padding:60px 0;color:var(--color-text-muted);">載入中…</div>
    <div class="event-cards" id="events-grid" style="display:none;"></div>
    <div id="events-empty" style="display:none;text-align:center;padding:60px 0;color:var(--color-text-muted);">
      <p style="font-size:18px;margin-bottom:8px;">目前尚無開放中的購買活動</p>
      <p>請稍後再查看</p>
    </div>
    <div style="margin-top:40px;text-align:center;padding:20px;border-top:1px solid var(--color-border);">
      <p style="font-size:14px;color:var(--color-text-muted);margin-bottom:12px;">已購買過？</p>
      <a href="order-lookup.html" class="btn btn--ghost btn--sm">🔍 查詢我的訂單</a>
      &nbsp;
      <a href="shop-guide.html" class="btn btn--ghost btn--sm">📋 購買說明 &amp; FAQ</a>
    </div>
  </div>
</section>

<section class="cta-section">
  <div class="container">
    <div class="cta-banner reveal">
      <div class="cta-banner__content">
        <h2 class="cta-banner__title">已完成報名了嗎？</h2>
        <p class="cta-banner__sub">別忘了同時完成活動報名，確保您的重聚席位。</p>
        <div class="btn-group" style="justify-content:center;">
          <a href="registration.html" class="btn btn--primary btn--lg">前往報名</a>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="footer-placeholder"></div>
<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/components.js"></script>
<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  let events = [];

  try {
    events = await CK48_API.getEvents();
  } catch (e) {
    events = (CK48_DATA.events || []).filter(ev => ev.status === 'ACTIVE' || ev.status === 'INACTIVE');
  }

  const loading = document.getElementById('events-loading');
  const grid = document.getElementById('events-grid');
  const empty = document.getElementById('events-empty');

  loading.style.display = 'none';

  if (!events.length) {
    empty.style.display = '';
    return;
  }

  grid.style.display = '';

  events.forEach(ev => {
    const isInactive = ev.status === 'INACTIVE';
    const eligBadge = ev.eligibility === 'ALUMNI_ONLY'
      ? '<span class="ev-badge ev-badge--alumni">限當屆校友</span>'
      : '<span class="ev-badge ev-badge--open">不限身份</span>';
    const statusBadge = isInactive
      ? '<span class="ev-badge ev-badge--ended">已結束</span>'
      : '<span class="ev-badge ev-badge--active">販售中</span>';
    const startDate = ev.startAt ? new Date(ev.startAt).toLocaleDateString('zh-TW') : '—';
    const endDate   = ev.endAt   ? new Date(ev.endAt).toLocaleDateString('zh-TW')   : '無截止日';
    const detailBtn = isInactive
      ? `<span class="btn btn--outline btn--sm" style="opacity:.45;pointer-events:none;width:100%;text-align:center;">已結束</span>`
      : ev.hashid
        ? `<a href="shop-detail.html?id=${ev.hashid}" class="btn btn--primary btn--sm" style="width:100%;text-align:center;">查看詳情 →</a>`
        : `<span class="btn btn--outline btn--sm" style="opacity:.45;pointer-events:none;width:100%;text-align:center;">即將開放</span>`;

    grid.innerHTML += `
      <article class="ev-card reveal${isInactive ? ' ev-card--ended' : ''}">
        <div class="ev-card__head">
          <div class="ev-card__badges">${eligBadge}${statusBadge}</div>
          <h2 class="ev-card__name">${ev.name}</h2>
          ${ev.description ? `<p class="ev-card__desc">${ev.description}</p>` : ''}
        </div>
        <div class="ev-card__sep"></div>
        <div class="ev-card__meta">
          <div class="ev-card__meta-row">
            <span class="ev-card__meta-label">販售期間</span>
            <span class="ev-card__meta-val">${startDate}${ev.endAt ? ' — ' + endDate : ''}</span>
          </div>
          <div class="ev-card__meta-row">
            <span class="ev-card__meta-label">商品項目</span>
            <span class="ev-card__meta-val">${ev.productCount || 0} 項</span>
          </div>
        </div>
        <div class="ev-card__foot">${detailBtn}</div>
      </article>`;
  });

  setTimeout(() => {
    document.querySelectorAll('.reveal:not(.revealed)').forEach(el => el.classList.add('revealed'));
  }, 50);
});
</script>
</body>
