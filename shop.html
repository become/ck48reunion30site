<body class="page-top">

<section class="section">
  <div class="container">
    <div id="events-loading" style="text-align:center;padding:60px 0;color:var(--color-text-muted);">載入中…</div>
    <div class="shop-grid" id="events-grid" style="display:none;"></div>
    <div id="events-empty" style="display:none;text-align:center;padding:60px 0;color:var(--color-text-muted);">

    </div>
    <div style="margin-top:40px;text-align:center;padding:20px;border-top:1px solid var(--color-border);">

    </div>
  </div>
</section>

  <div class="container">
    <div class="cta-banner reveal">
      <div class="cta-banner__content">

        <p class="cta-banner__sub">別忘了同時完成活動報名，確保您的重聚席位。</p>

<script src="js/data.js"></script>

<script src="js/components.js"></script>
<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  let events = [];

  try {
    events = await CK48_API.getEvents();
  } catch (e) {
    events = (CK48_DATA.events || []).filter(ev => ev.status === 'ACTIVE' || ev.status === 'INACTIVE');
  }

  const loading = document.getElementById('events-loading');
  const grid = document.getElementById('events-grid');
  const empty = document.getElementById('events-empty');

  loading.style.display = 'none';

  if (!events.length) {
    empty.style.display = '';
    return;
  }

  grid.style.display = '';

  events.forEach(ev => {
    const isInactive = ev.status === 'INACTIVE';
    const eligBadge = ev.eligibility === 'ALUMNI_ONLY'
      ? '<span class="badge badge--primary" style="font-size:12px;">限當屆校友</span>'
      : '<span class="badge badge--light" style="font-size:12px;">不限身份</span>';
    const statusBadge = isInactive
      ? '<span class="badge" style="font-size:12px;background:#e5e7eb;color:#6b7280;">已結束</span>'
      : '';
    const startDate = ev.startAt ? new Date(ev.startAt).toLocaleDateString('zh-TW') : '';
    const endDate = ev.endAt ? new Date(ev.endAt).toLocaleDateString('zh-TW') : '無期限';
    const detailBtn = isInactive
      ? `<span class="btn btn--outline btn--sm" style="opacity:.5;pointer-events:none;">已結束</span>`
      : ev.hashid
        ? `<a href="shop-detail.html?id=${ev.hashid}" class="btn btn--outline btn--sm">查看詳情</a>`
        : `<span class="btn btn--outline btn--sm" style="opacity:.5;pointer-events:none;">即將開放</span>`;

    grid.innerHTML += `
      <article class="product-card reveal" style="${isInactive ? 'opacity:.6;filter:grayscale(.3);' : ''}">
        <div class="product-card__img" style="background:linear-gradient(135deg,var(--color-primary) 0%,#2a4f7c 100%);display:flex;align-items:center;justify-content:center;position:relative;">
          <span style="font-size:56px;">🎁</span>
          ${isInactive ? '<div style="position:absolute;inset:0;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;"><span style="background:rgba(0,0,0,.5);color:#fff;font-size:13px;font-weight:700;padding:4px 12px;border-radius:20px;">已結束</span></div>' : ''}
        </div>
        <div class="product-card__body">
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
            ${eligBadge}
          </div>
          <h2 class="product-card__name">${ev.name}</h2>
          <p class="product-card__desc">${ev.description || ''}</p>
          <p style="font-size:12px;color:var(--color-text-muted);margin-bottom:14px;display:flex;align-items:center;gap:4px;">
            <span>🗓</span>
            <span>${startDate}${ev.endAt ? ' — ' + endDate : '（無截止日）'}</span>
          </p>
          <div class="product-card__footer">
            <span style="font-size:13px;color:var(--color-text-muted);font-weight:600;">${ev.productCount || 0} 項商品</span>
            ${detailBtn}
          </div>
        </div>
      </article>`;
  });

  setTimeout(() => {
    document.querySelectorAll('.reveal:not(.revealed)').forEach(el => el.classList.add('revealed'));
  }, 50);
});
</script>
</body>
