<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>最新消息 · 建中第48屆30年重聚</title>
  <link rel="icon" href="images/favico.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="page-top">
<div id="header-placeholder"></div>

<section class="page-hero">
  <div class="container page-hero__content">
    <div class="page-hero__eyebrow">Latest News</div>
    <h1 class="page-hero__title">最新消息</h1>
    <p class="page-hero__sub">活動公告、籌備進度、重要通知</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <!-- Filters -->
    <div style="display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:16px;margin-bottom:32px;">
      <div class="tabs" style="margin-bottom:0;" data-news-filter>
        <button class="tab-btn active" data-cat="all">全部</button>
        <button class="tab-btn" data-cat="公告">公告</button>
        <button class="tab-btn" data-cat="活動">活動</button>
        <button class="tab-btn" data-cat="找人進度">找人進度</button>
      </div>
      <div>
        <input type="search" id="news-search" class="form-control" style="max-width:240px;" placeholder="搜尋消息…" aria-label="搜尋消息">
      </div>
    </div>

    <div class="news-grid" id="news-grid">
      <!-- Rendered by JS -->
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>
  </div>
</section>

<div id="footer-placeholder"></div>
<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/components.js"></script>
<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const PAGE_SIZE = 9;
  let allNews = [];
  let currentCat = 'all';
  let searchQuery = '';
  let currentPage = 1;

  function getFiltered() {
    return allNews.filter(n => {
      const matchCat  = currentCat === 'all' || n.category === currentCat;
      const matchSrch = !searchQuery || n.title.includes(searchQuery) || (n.summary || '').includes(searchQuery);
      return matchCat && matchSrch;
    });
  }

  function renderNews() {
    const grid = document.getElementById('news-grid');
    const filtered = getFiltered();
    const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
    if (currentPage > totalPages) currentPage = totalPages;
    const pageItems = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

    grid.innerHTML = pageItems.length ? '' : '<p style="color:var(--color-text-muted);grid-column:1/-1;text-align:center;padding:40px 0;">找不到符合的消息。</p>';
    pageItems.forEach(n => {
      const date = n.publishedAt ? formatDate(n.publishedAt) : (n.date ? formatDate(n.date) : '');
      grid.innerHTML += `
        <article class="news-card reveal">
          <div class="news-card__body">
            <div class="news-card__meta">
              <span class="badge badge--news">${n.category}</span>
              <span class="news-card__date">${date}</span>
            </div>
            <h2 class="news-card__title">${n.title}</h2>
            <p class="news-card__summary">${n.summary || ''}</p>
            <a href="news-detail.html?slug=${n.slug}" class="news-card__link">閱讀更多 →</a>
          </div>
        </article>`;
    });
    document.querySelectorAll('.reveal:not(.revealed)').forEach(el => {
      setTimeout(() => el.classList.add('revealed'), 50);
    });

    renderPagination(totalPages);
  }

  function renderPagination(totalPages) {
    const el = document.getElementById('pagination');
    if (totalPages <= 1) { el.innerHTML = ''; return; }
    let html = '';
    if (currentPage > 1) {
      html += `<button class="page-btn page-btn--wide" data-page="${currentPage - 1}">← 上一頁</button>`;
    }
    for (let i = 1; i <= totalPages; i++) {
      if (totalPages > 7 && Math.abs(i - currentPage) > 2 && i !== 1 && i !== totalPages) {
        if (i === currentPage - 3 || i === currentPage + 3) html += `<span style="align-self:center;color:var(--color-text-muted)">…</span>`;
        continue;
      }
      html += `<button class="page-btn${i === currentPage ? ' active' : ''}" data-page="${i}">${i}</button>`;
    }
    if (currentPage < totalPages) {
      html += `<button class="page-btn page-btn--wide" data-page="${currentPage + 1}">下一頁 →</button>`;
    }
    el.innerHTML = html;
    el.querySelectorAll('[data-page]').forEach(btn => {
      btn.addEventListener('click', () => {
        currentPage = parseInt(btn.dataset.page);
        renderNews();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  // Filter tabs
  document.querySelectorAll('[data-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = btn.dataset.cat;
      currentPage = 1;
      renderNews();
    });
  });

  // Search
  document.getElementById('news-search').addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    currentPage = 1;
    renderNews();
  });

  // Load from API, fallback to mock data
  try {
    allNews = await CK48_API.getNews();
  } catch (e) {
    console.warn('API unavailable, using mock data', e);
    allNews = CK48_DATA.news;
  }
  renderNews();
});
</script>
</body>
</html>
