<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>購買活動 | 建中48屆30重聚</title>
  <meta name="description" content="建中48屆30年重聚紀念商品購買。">
  <meta name="robots" content="index, follow">
  <meta property="og:type"        content="website">
  <meta property="og:site_name"   content="建中48屆30重聚">
  <meta property="og:locale"      content="zh_TW">
  <meta property="og:title"       content="購買活動 | 建中48屆30重聚">
  <meta property="og:description" content="建中48屆30年重聚紀念商品購買。">
  <meta property="og:image"       content="https://ck48.reunion30.tw/images/og-default.jpg">
  <meta name="twitter:card"        content="summary_large_image">
  <link rel="icon" href="images/favico.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .product-list { display: grid; gap: 16px; }
    .product-item {
      display: flex; gap: 20px; align-items: flex-start;
      padding: 20px; background: #fff;
      border: 1px solid var(--color-border); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      transition: box-shadow .2s;
    }
    .product-item:hover { box-shadow: var(--shadow-md); }
    .product-item__img {
      width: 88px; height: 88px; flex-shrink: 0;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg,#e8e2d8,#d4c9b8);
      display: flex; align-items: center; justify-content: center;
      font-size: 38px; overflow: hidden;
    }
    .product-item__img img { width: 100%; height: 100%; object-fit: cover; }
    .product-item__body { flex: 1; min-width: 0; }
    .product-item__name  { font-size: 17px; font-weight: 700; color: var(--color-primary); margin-bottom: 4px; }
    .product-item__price { font-size: 20px; font-weight: 800; color: var(--color-secondary); margin-bottom: 6px; }
    .product-item__meta  { font-size: 13px; color: var(--color-text-muted); line-height: 1.7; }
    .product-item { cursor: pointer; }
    .product-item:hover { box-shadow: var(--shadow-md); border-color: rgba(31,58,95,.2); }
    .product-item__hint { font-size: 12px; color: var(--color-text-muted); margin-top: 6px; opacity: .7; }
    @media(max-width:500px){
      .product-item { flex-direction: column; }
      .product-item__img { width: 100%; height: 140px; font-size: 56px; border-radius: var(--radius-lg) var(--radius-lg) 0 0; margin: -20px -20px 0; width: calc(100% + 40px); }
    }
    /* Product modal */
    .pmodal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.55);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 16px;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    .pmodal-backdrop.open { opacity: 1; pointer-events: auto; }
    .pmodal {
      background: #fff; border-radius: 20px;
      width: 100%; max-width: 520px; max-height: 90vh;
      overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,.2);
      transform: translateY(16px); transition: transform .2s;
    }
    .pmodal-backdrop.open .pmodal { transform: translateY(0); }
    .pmodal__img-wrap {
      width: 100%; aspect-ratio: 1/1;
      background: linear-gradient(135deg,#e8e2d8,#d4c9b8);
      display: flex; align-items: center; justify-content: center;
      font-size: 80px; overflow: hidden;
      border-radius: 20px 20px 0 0;
    }
    .pmodal__img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .pmodal__thumbs { display: flex; gap: 8px; padding: 10px 20px 0; flex-wrap: wrap; }
    .pmodal__thumb {
      width: 56px; height: 56px; border-radius: 8px; overflow: hidden;
      border: 2px solid transparent; cursor: pointer; flex-shrink: 0;
      transition: border-color .15s;
    }
    .pmodal__thumb.active { border-color: var(--color-primary); }
    .pmodal__thumb img { width: 100%; height: 100%; object-fit: cover; }
    .pmodal__body { padding: 20px 24px 28px; }
    .pmodal__name { font-size: 22px; font-weight: 800; color: var(--color-primary); margin-bottom: 4px; line-height: 1.3; }
    .pmodal__price { font-size: 26px; font-weight: 800; color: var(--color-secondary); margin-bottom: 14px; }
    .pmodal__desc { font-size: 14px; color: var(--color-text-muted); line-height: 1.85; white-space: pre-wrap; margin-bottom: 16px; }
    .pmodal__meta { font-size: 13px; color: var(--color-text-muted); line-height: 2; border-top: 1px solid var(--color-border); padding-top: 14px; }
    .pmodal__close {
      position: absolute; top: 14px; right: 14px;
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(0,0,0,.35); color: #fff;
      border: none; cursor: pointer; font-size: 18px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
    }
  </style>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-YJYP34JVKM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-YJYP34JVKM');
  </script>
</head>
<body class="page-top">
<div id="header-placeholder"></div>

<section class="section">
  <div class="container" style="max-width:760px;">
    <nav class="breadcrumb">
      <a href="index.html">首頁</a>
      <span class="breadcrumb__sep">/</span>
      <a href="shop.html">紀念商品</a>
      <span class="breadcrumb__sep">/</span>
      <span id="bc-event">活動詳情</span>
    </nav>

    <div id="event-loading" style="text-align:center;padding:60px 0;color:var(--color-text-muted);">載入中…</div>

    <div id="event-content" style="display:none;">
      <h1 id="event-name" style="font-size:clamp(24px,4vw,36px);font-weight:800;color:var(--color-primary);margin-bottom:12px;"></h1>
      <div id="event-badges" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;"></div>
      <p id="event-desc" style="font-size:16px;color:var(--color-text-muted);line-height:1.75;margin-bottom:8px;"></p>
      <p id="event-time" style="font-size:14px;color:var(--color-text-muted);margin-bottom:28px;"></p>

      <h2 style="font-size:16px;font-weight:700;color:var(--color-primary);margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--color-border);">可購買商品</h2>
      <div id="product-list" class="product-list"></div>

      <div id="event-actions" style="margin-top:32px;"></div>
    </div>

    <!-- Product detail modal -->
    <div id="product-modal" class="pmodal-backdrop" role="dialog" aria-modal="true">
      <div class="pmodal" style="position:relative;">
        <button class="pmodal__close" id="pmodal-close" aria-label="關閉">&times;</button>
        <div class="pmodal__img-wrap" id="pmodal-img-wrap"></div>
        <div id="pmodal-thumbs" class="pmodal__thumbs"></div>
        <div class="pmodal__body">
          <div class="pmodal__name" id="pmodal-name"></div>
          <div class="pmodal__price" id="pmodal-price"></div>
          <div class="pmodal__desc" id="pmodal-desc" style="display:none;"></div>
          <div class="pmodal__meta" id="pmodal-meta"></div>
        </div>
      </div>
    </div>

    <div id="event-error" style="display:none;text-align:center;padding:60px 0;color:var(--color-text-muted);">
      <p style="font-size:18px;margin-bottom:16px;">活動不存在或已結束</p>
      <a href="shop.html" class="btn btn--outline">← 返回商品列表</a>
    </div>
  </div>
</section>

<div id="footer-placeholder"></div>
<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/components.js"></script>
<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
    ? 'http://localhost:3000'
    : 'https://api.reunion30.tw';

  const params = new URLSearchParams(location.search);
  const eventHashid = params.get('id');

  const loading = document.getElementById('event-loading');
  const content = document.getElementById('event-content');
  const errorEl = document.getElementById('event-error');

  if (!eventHashid) {
    loading.style.display = 'none';
    errorEl.style.display = '';
    return;
  }

  let event;
  try {
    event = await CK48_API.getEvent(eventHashid);
  } catch (e) {
    console.error('getEvent failed:', eventHashid, e);
    loading.style.display = 'none';
    errorEl.querySelector('p').textContent = e?.message || '活動不存在或已結束';
    errorEl.style.display = '';
    return;
  }

  loading.style.display = 'none';
  content.style.display = '';

  const now = new Date();
  const startAt  = event.startAt ? new Date(event.startAt) : null;
  const endAt    = event.endAt   ? new Date(event.endAt)   : null;
  const hasStarted = !startAt || now >= startAt;
  const hasEnded   = !!endAt && now > endAt;

  const isInactive   = event.status === 'INACTIVE' || hasEnded;
  const isComingSoon = event.status === 'ACTIVE' && !hasStarted;
  const isOpen       = event.status === 'ACTIVE' && hasStarted && !hasEnded;

  document.title = `${event.name} | 建中48屆30重聚`;
  document.getElementById('bc-event').textContent = event.name;
  document.getElementById('event-name').textContent = event.name;
  document.getElementById('event-desc').textContent = event.description || '';

  const startDate = event.startAt ? new Date(event.startAt).toLocaleDateString('zh-TW') : '';
  const endDate = event.endAt ? new Date(event.endAt).toLocaleDateString('zh-TW') : '無期限';
  document.getElementById('event-time').textContent =
    `開賣時間：${startDate}${event.endAt ? ' — ' + endDate : ''}`;

  const badgesEl = document.getElementById('event-badges');
  const eligBadge = event.eligibility === 'ALUMNI_ONLY'
    ? '<span class="badge badge--primary">限當屆校友</span>'
    : '<span class="badge badge--light">不限身份</span>';
  const statusBadge = isInactive
    ? '<span class="badge" style="background:#e5e7eb;color:#6b7280;">已結束</span>'
    : isComingSoon
      ? '<span class="badge" style="background:#eff6ff;color:#1d4ed8;">即將開賣</span>'
      : '<span class="badge badge--success">購買中</span>';
  badgesEl.innerHTML = eligBadge + statusBadge;

  const productList = document.getElementById('product-list');
  if (!event.products || event.products.length === 0) {
    productList.innerHTML = '<p style="color:var(--color-text-muted);">此活動目前無可購買商品</p>';
  } else {
    event.products.forEach(p => {
      const canBuy = p.status === 'ACTIVE' && !isInactive;
      const stockHtml = p.stockType === 'LIMITED' && p.availableStock != null
        ? `剩餘：${p.availableStock} 件` : '';
      const limitHtml = p.maxPerPerson ? `每人限購 ${p.maxPerPerson} 件` : '';
      const resolvedImg = url => url.startsWith('/') ? API_BASE + url : url;
      const imgHtml = p.mainImage
        ? `<img src="${resolvedImg(p.mainImage)}" alt="${p.name}">`
        : '🎁';

      const el = document.createElement('div');
      el.className = 'product-item';
      el.innerHTML = `
        <div class="product-item__img">${imgHtml}</div>
        <div class="product-item__body">
          <div class="product-item__name">${p.name}</div>
          <div class="product-item__price">NT$${p.price.toLocaleString()}</div>
          <div class="product-item__meta">${[stockHtml, limitHtml].filter(Boolean).join('　')}</div>
          ${!canBuy ? '<div class="product-item__meta" style="margin-top:4px;">⛔ 此商品暫不開放購買</div>' : ''}
          <div class="product-item__hint">點擊查看詳細說明 →</div>
        </div>`;

      el.addEventListener('click', () => openProductModal(p, resolvedImg));
      productList.appendChild(el);
    });
  }

  // Product modal
  function openProductModal(p, resolveUrl) {
    const modal = document.getElementById('product-modal');
    const imgWrap = document.getElementById('pmodal-img-wrap');
    const thumbs  = document.getElementById('pmodal-thumbs');

    const images = (p.images || []).map(resolveUrl);
    const main   = p.mainImage ? resolveUrl(p.mainImage) : null;

    function setMainImg(src) {
      imgWrap.innerHTML = src
        ? `<img src="${src}" alt="${p.name}">`
        : '<span>🎁</span>';
      thumbs.querySelectorAll('.pmodal__thumb').forEach(t => {
        t.classList.toggle('active', t.dataset.src === src);
      });
    }

    if (images.length > 1) {
      thumbs.style.display = '';
      thumbs.innerHTML = images.map((src, i) =>
        `<div class="pmodal__thumb${i === 0 ? ' active' : ''}" data-src="${src}">
           <img src="${src}" alt="">
         </div>`
      ).join('');
      thumbs.querySelectorAll('.pmodal__thumb').forEach(t => {
        t.addEventListener('click', () => setMainImg(t.dataset.src));
      });
    } else {
      thumbs.style.display = 'none';
    }

    setMainImg(main);

    document.getElementById('pmodal-name').textContent  = p.name;
    document.getElementById('pmodal-price').textContent = 'NT$' + p.price.toLocaleString();

    const descEl = document.getElementById('pmodal-desc');
    if (p.description) {
      descEl.textContent = p.description;
      descEl.style.display = '';
    } else {
      descEl.style.display = 'none';
    }

    const meta = [];
    if (p.stockType === 'LIMITED' && p.availableStock != null) meta.push(`剩餘庫存：${p.availableStock} 件`);
    if (p.maxPerPerson) meta.push(`每人限購：${p.maxPerPerson} 件`);
    if (!isInactive && p.status !== 'ACTIVE') meta.push('⛔ 此商品暫不開放購買');
    document.getElementById('pmodal-meta').innerHTML = meta.length
      ? meta.map(m => `<div>${m}</div>`).join('')
      : '';

    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  document.getElementById('pmodal-close').addEventListener('click', closeProductModal);
  document.getElementById('product-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeProductModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeProductModal();
  });

  function closeProductModal() {
    document.getElementById('product-modal').classList.remove('open');
    document.body.style.overflow = '';
  }

  const actionsEl = document.getElementById('event-actions');
  if (isInactive) {
    actionsEl.innerHTML = `
      <div class="status-box status-box--info" style="margin-bottom:16px;">
        <div class="status-box__icon">ℹ️</div>
        <div>
          <div class="status-box__title">此活動已結束</div>
          <div class="status-box__desc">若您已購買，可點下方按鈕重新取得訂單連結。</div>
        </div>
      </div>
      <div class="btn-group">
        <a href="shop-start.html?event=${eventHashid}&lookup=1" class="btn btn--outline">查詢我的訂單</a>
        <a href="shop.html" class="btn btn--outline">← 返回商品列表</a>
      </div>`;
  } else if (isComingSoon) {
    const dateStr = startAt
      ? startAt.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' })
      : '';
    actionsEl.innerHTML = `
      <div class="status-box status-box--info" style="margin-bottom:16px;">
        <div class="status-box__icon">🕐</div>
        <div>
          <div class="status-box__title">活動尚未開始</div>
          <div class="status-box__desc">將於 ${dateStr} 開始販售，請屆時再回來選購。</div>
        </div>
      </div>
      <div class="btn-group">
        <a href="shop.html" class="btn btn--outline">← 返回商品列表</a>
      </div>`;
  } else {
    actionsEl.innerHTML = `
      <div class="btn-group">
        <a href="shop-start.html?event=${eventHashid}" class="btn btn--primary btn--lg">開始購買</a>
        <a href="shop.html" class="btn btn--outline">← 返回商品列表</a>
      </div>`;
  }
});
</script>
</body>
</html>
